    - python3 $NUCLEI_SDK_ROOT/tools/scripts/nsdk_cli/nsdk_bench.py --appcfg Scripts/Runner/nmsis_dsp_${NUCLEI_DSP}.json --logdir $NMSIS_LOGS/${NUCLEI_DSP}/nmsis_dsp_llvm --parallel=-j --make_options "SIMU=$RUNTARGET TOOLCHAIN=nuclei_llvm" --run_target $RUNTARGET --run
    # zip logs
    - cd -
    - zip -q -r log_nmsis_dsp_llvm_${NUCLEI_DSP}.zip NMSIS/Logs
    - rm -rf NMSIS/Logs

release_benchmark:
  stage: release
  interruptible: true
  only:
    refs:
      - master
      - develop
      - /^feature\/.*/
      - merge_requests
  artifacts:
    name: "nmsis_test_logs-job${CI_JOB_ID}-${CI_COMMIT_SHA::8}"
    paths:
      - log_nmsis.zip
    expire_in: 2 day
  dependencies:
    - test_nn_library
    - test_dsp_library
    - test_nn_library_terapines
    - test_dsp_library_terapines
    - test_nn_library_llvm
    - test_dsp_library_llvm
  script:
    # unzip all log_nmsis_*.zip files
    - for zf in `find . -name "log_nmsis*.zip"` ; do unzip -qo $zf ; done
    - ls -lh NMSIS/Logs
    - rm -f log_nmsis_*.zip
    - zip -q -r log_nmsis.zip NMSIS/Logs

release_nmsis:
  stage: release
  interruptible: true
  only:
    refs:
      - master
      - develop
      - /^feature\/.*/
      - merge_requests
  artifacts:
    name: "nmsis_release-$job${CI_JOB_ID}-{CI_COMMIT_SHA::8}"
    paths:
      - NMSIS/Core
      - NMSIS/DSP/Include
      - NMSIS/DSP/PrivateInclude
      - NMSIS/NN/Include
      - NMSIS/Library
      - NMSIS/npk.yml
      - NMSIS/build.mk
    expire_in: 2 day
  dependencies:
    - build_library
  script:
    - ls -lh NMSIS/gen/
    # choose proper built library to release
    - rm -rf NMSIS/Library
    - mv NMSIS/gen/Library NMSIS/
    - ls -lh NMSIS/Library
    - cat NMSIS/npk.yml

deploy_website:
  stage: release
  only:
    refs:
      - master
    changes:
      - NMSIS/doc/source/**/**/**/*
      - .gitlab-ci.yml
      - NMSIS/Core/
      - NMSIS/DSP/
      - NMSIS/NN/
  dependencies:
    - build_doc
  tags:
    - env::shell
    - host::whss1
  script:
    - ./.ci/ftp_deploy.sh $FTPUSER $FTPPWD $FTPSERVER NMSIS/doc/build/html nmsis

